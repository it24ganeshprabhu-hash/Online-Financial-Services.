<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFS | Transaction Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #00BFA5;
            --bg-app: #F4F7F9;
            --white: #FFFFFF;
            --text-main: #1A1D23;
            --text-muted: #64748B;
            --radius-lg: 24px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --success: #10B981;
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-app); font-family: 'Inter', sans-serif; color: var(--text-main); }

        .navbar {
            background: var(--white); padding: 1rem 6%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #E2E8F0;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary-teal); text-decoration: none; }
        .back-link { text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 0.9rem; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .filter-bar {
            background: var(--white); padding: 20px; border-radius: 15px;
            margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end;
            box-shadow: var(--shadow-sm); flex-wrap: wrap;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .filter-group input, .filter-group select {
            padding: 8px 12px; border: 1px solid #E2E8F0; border-radius: 8px;
            font-family: inherit; font-weight: 600;
        }

        .passbook-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #F8FAFC; padding: 18px 25px; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 20px 25px; border-bottom: 1px solid #F1F5F9; font-weight: 600; font-size: 0.9rem; }

        .type-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; display: inline-block; margin-bottom: 4px; }
        .badge-credit { background: #DCFCE7; color: #166534; }
        .badge-debit { background: #FEE2E2; color: #991B1B; }

        .pagination { padding: 20px; display: flex; justify-content: center; gap: 8px; background: #F8FAFC; }
        .pagination button { padding: 8px 14px; border: 1px solid #E2E8F0; background: white; border-radius: 8px; cursor: pointer; }
        .pagination button.active { background: var(--primary-teal); color: white; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">💠 OFS LOGS</a>
    <a id="backBtn" class="back-link">← Back to Terminal</a>
</nav>

<div class="container">
    <div class="filter-bar">
        <div class="filter-group">
            <label>Search Details</label>
            <input type="text" id="searchInput" placeholder="e.g. Trading" oninput="render()">
        </div>
        <div class="filter-group">
            <label>Type</label>
            <select id="typeFilter" onchange="render()">
                <option value="all">All Transactions</option>
                <option value="credit">Credits Only</option>
                <option value="debit">Debits Only</option>
            </select>
        </div>
        <button onclick="loadLogs()" style="margin-left:auto; background:var(--primary-teal); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer;">Refresh</button>
    </div>

    <div class="passbook-card">
        <table>
            <thead>
            <tr>
                <th>Date & Time</th>
                <th>Transaction Details</th>
                <th>Balance</th>
                <th>Amount</th>
            </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
        <div id="noData" style="padding:40px; text-align:center; display:none; color:var(--text-muted);">No activity found.</div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8081';
    let userId;
    let allLogs = [];
    let currentPage = 1;
    const itemsPerPage = 10;

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        userId = params.get('id') || localStorage.getItem("userId");

        if(!userId) {
            alert("Session expired. Please login.");
            window.location.href = "login.html";
            return;
        }

        document.getElementById('backBtn').href = `trading.html?id=${userId}`;
        loadLogs();
    };

    async function loadLogs() {
        try {
            const res = await fetch(`${API_URL}/passbook/${userId}`);
            allLogs = await res.json();
            render();
        } catch (err) {
            console.error("Failed to load logs", err);
        }
    }

    function render() {
        const tbody = document.getElementById('logBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const typeFilter = document.getElementById('typeFilter').value;

        // 1. Filter Logic
        let filtered = allLogs.filter(log => {
            const desc = log.description.toLowerCase();
            const isCredit = desc.includes('deposit') ||
                             desc.includes('received') ||
                             desc.includes('interest') ||
                             (desc.includes('trading') && desc.includes('withdrawal'));

            const matchesSearch = desc.includes(searchTerm);
            const matchesType = typeFilter === 'all' ||
                               (typeFilter === 'credit' && isCredit) ||
                               (typeFilter === 'debit' && !isCredit);

            return matchesSearch && matchesType;
        });

        // 2. Sort Newest First
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

        // 3. Handle Empty State
        if(filtered.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('noData').style.display = 'block';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        document.getElementById('noData').style.display = 'none';

        // 4. Pagination
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = filtered.slice(start, start + itemsPerPage);

        tbody.innerHTML = pageItems.map(log => {
            const d = log.description.toLowerCase();
            // TRADING LOGIC: Withdrawal from Trading is a Credit (Green)
            const isCredit = d.includes('deposit') ||
                             d.includes('received') ||
                             d.includes('interest') ||
                             (d.includes('trading') && d.includes('withdrawal'));

            return `
                <tr>
                    <td style="font-size: 0.8rem; color: var(--text-muted);">
                        ${new Date(log.date).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })}
                    </td>
                    <td>
                        <span class="type-badge ${isCredit ? 'badge-credit' : 'badge-debit'}">
                            ${isCredit ? 'CREDIT' : 'DEBIT'}
                        </span>
                        <div style="font-size: 0.85rem;">${log.description}</div>
                    </td>
                    <td style="color: var(--text-muted);">₹${log.currBalance.toFixed(2)}</td>
                    <td style="color: ${isCredit ? 'var(--success)' : 'var(--danger)'}; font-weight: 800;">
                        ${isCredit ? '+' : '-'} ₹${log.amount.toFixed(2)}
                    </td>
                </tr>
            `;
        }).join('');

        renderPagination(filtered.length);
    }

    function renderPagination(totalItems) {
        const nav = document.getElementById('pagination');
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        nav.innerHTML = '';
        for(let i=1; i<=totalPages; i++) {
            nav.innerHTML += `<button class="${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
        }
    }

    function changePage(p) { currentPage = p; render(); }
</script>

</body>
</html>
