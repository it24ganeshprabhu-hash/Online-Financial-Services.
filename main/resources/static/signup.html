<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join OFS - Secure Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #00BFA5;
            --primary-dark: #00897B;
            --bg-app: #F4F7F8;
            --white: #FFFFFF;
            --text-main: #2D3142;
            --text-muted: #9BA1A6;
            --radius: 20px;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-app);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 50px 20px;
        }

        .auth-card {
            background: var(--white); width: 100%; max-width: 550px;
            padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow);
        }

        .auth-header { text-align: center; margin-bottom: 25px; }
        .logo-mark { font-size: 2rem; color: var(--primary-teal); font-weight: 800; text-decoration: none; display: block; margin-bottom: 5px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: var(--text-main); }

        .form-input, select, textarea {
            width: 100%; padding: 12px; border: 2px solid #EAECEF;
            border-radius: 10px; font-size: 0.9rem; transition: 0.3s; background: white;
            font-family: inherit;
        }

        textarea { resize: vertical; min-height: 80px; }
        .form-input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-teal); }

        .aadhaar-input-group { display: flex; gap: 8px; justify-content: space-between; }
        .aadhaar-box { width: 32%; text-align: center; font-weight: 700; }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--primary-teal);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }

        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .message { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; display: none; text-align: center; }
        .message.error { background: #fee2e2; color: #dc2626; display: block; }
        .message.success { background: #dcfce7; color: #16a34a; display: block; }

        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary-teal); text-decoration: none; font-weight: 600; cursor: pointer; }

        /* Loading Spinner Styles */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary-teal);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .verified-badge {
            color: #16a34a;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 8px;
            display: none;
        }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <a href="home.html" class="logo-mark">💠 OFS</a>
        <h2>Complete Registration</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Secure your financial future today</p>
    </div>

    <div id="signupMessage" class="message"></div>

    <form id="signupForm">
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" class="form-input" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" class="form-input" placeholder="Choose username" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" class="form-input" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="signupDOB" class="form-input" required>
            </div>

            <div class="form-group full-width">
                <label>Residential Address</label>
                <textarea id="signupAddress" class="form-input" placeholder="Full address with ZIP code" required></textarea>
            </div>

            <div class="form-group full-width">
                <label>
                    Aadhaar Number (Linked to Mobile)
                    <span id="aadhaarLoader" class="loader"></span>
                    <span id="aadhaarBadge" class="verified-badge">✓ VERIFIED</span>
                </label>
                <div class="aadhaar-input-group">
                    <input type="text" class="form-input aadhaar-box" maxlength="4" placeholder="0000" id="ad1" required inputmode="numeric">
                    <input type="text" class="form-input aadhaar-box" maxlength="4" placeholder="0000" id="ad2" required inputmode="numeric">
                    <input type="text" class="form-input aadhaar-box" maxlength="4" placeholder="0000" id="ad3" required inputmode="numeric">
                </div>
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <select id="signupAccountType" required>
                    <option value="">Select Account</option>
                    <option value="SAVINGS">Savings Account</option>
                    <option value="CURRENT">Current (Business)</option>
                    <option value="SALARY">Salary Account</option>
                </select>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select id="signupRole" required>
                    <option value="customer">Customer</option>
                    <option value="admin">Admin (Requires Auth)</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Password</label>
                <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">Register Securely</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a onclick="window.location.href='login.html'">Login here</a>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8081';

    const showMessage = (text, type) => {
        const msg = document.getElementById("signupMessage");
        msg.innerText = text;
        msg.className = "message " + type;
    };

    const loader = document.getElementById("aadhaarLoader");
    const badge = document.getElementById("aadhaarBadge");
    const aadhaarBoxes = document.querySelectorAll('.aadhaar-box');

    // Auto-focus logic + Auto-fill if Verified logic
    aadhaarBoxes.forEach((box, index) => {
        box.addEventListener('input', async () => {
            if (box.value.length === box.maxLength && index < aadhaarBoxes.length - 1) {
                aadhaarBoxes[index + 1].focus();
            }

            const fullAadhaar = Array.from(aadhaarBoxes).map(b => b.value).join('');
            if (fullAadhaar.length === 12) {
                // UI Start: Show Loader
                loader.style.display = "inline-block";
                badge.style.display = "none";

                try {
                    const response = await fetch(`${API_URL}/verify-aadhaar/${fullAadhaar}`);
                    if (response.ok) {
                        const data = await response.json();

                        if (data.verified === true) {
                            // Fill fields
                            document.getElementById("signupName").value = data.name;
                            document.getElementById("signupDOB").value = data.dob;
                            document.getElementById("signupAddress").value = data.address;
                            document.getElementById("signupEmail").value = data.email || ""; // Gmail Fill

                            // Lock verified fields
                            document.getElementById("signupName").readOnly = true;
                            document.getElementById("signupDOB").readOnly = true;
                            document.getElementById("signupEmail").readOnly = true;

                            // UI Success: Show Badge
                            badge.style.display = "inline-block";
                            showMessage("Verified Aadhaar found! Data synced.", "success");
                        } else {
                            showMessage("Aadhaar found but not yet verified.", "error");
                        }
                    }
                } catch (error) {
                    console.log("Aadhaar not found or fetch error.");
                } finally {
                    loader.style.display = "none";
                }
            }
        });

        box.addEventListener('keydown', (e) => {
            if (e.key === "Backspace" && !box.value && index > 0) {
                aadhaarBoxes[index - 1].focus();
            }
        });
    });

    document.getElementById("signupForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const fullAadhaar = Array.from(aadhaarBoxes).map(b => b.value).join('');

        const signupData = {
            name: document.getElementById("signupName").value,
            username: document.getElementById("signupUsername").value,
            email: document.getElementById("signupEmail").value,
            dob: document.getElementById("signupDOB").value,
            address: document.getElementById("signupAddress").value,
            password: document.getElementById("signupPassword").value,
            role: document.getElementById("signupRole").value,
            accountType: document.getElementById("signupAccountType").value,
            aadhaarNumber: fullAadhaar
        };

        fetch(`${API_URL}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(signupData)
        })
        .then(response => response.text())
        .then(result => {
            if (result.toLowerCase().includes("successful")) {
                showMessage(result, "success");
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
            } else {
                showMessage(result, "error");
            }
        })
        .catch(error => {
            showMessage("Server unreachable. Check backend status.", "error");
        });
    });
</script>
</body>
</html>
