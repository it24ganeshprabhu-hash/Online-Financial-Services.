<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFS | Smart Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #00BFA5;
            --primary-dark: #00897B;
            --bg-app: #F4F7F9;
            --white: #FFFFFF;
            --text-main: #1A1D23;
            --text-muted: #64748B;
            --radius-lg: 28px;
            --radius-md: 18px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-app); font-family: 'Inter', sans-serif; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        .navbar {
            background: var(--white); padding: 1rem 6%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #E2E8F0;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary-teal); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-link-item { text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .btn-logout {
            padding: 8px 18px; border-radius: 10px; border: 1.5px solid #E2E8F0;
            background: white; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { background: #FFF1F2; color: #E11D48; border-color: #FDA4AF; }

        .btn-primary {
            width: 100%; background: var(--primary-teal); color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 15px; transition: 0.2s;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(1.01); }

        .btn-secondary {
            width: 100%; background: #F8FAFC; color: var(--text-muted); border: 1px solid #E2E8F0;
            padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s;
        }

        /* --- NOTIFICATION DRAWER (SCROLLABLE CHANGES) --- */
        .notif-drawer {
            position: fixed; top: 0; right: -350px; width: 350px; height: 100vh;
            background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 2001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px;
            display: flex; flex-direction: column; /* Keep as flex to allow list to fill space */
        }
        .notif-drawer.open { right: 0; }

        #notifList {
            flex: 1; /* This makes the list take up all remaining height */
            overflow-y: auto; /* Enable vertical scrolling */
            padding-right: 10px;
            margin-top: 10px;
        }

        /* Custom Scrollbar for Drawer */
        #notifList::-webkit-scrollbar { width: 5px; }
        #notifList::-webkit-scrollbar-track { background: #F1F5F9; }
        #notifList::-webkit-scrollbar-thumb { background: var(--primary-teal); border-radius: 10px; }

        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px); z-index: 2000; display: none;
        }
        .drawer-overlay.show { display: block; }
        .notif-item { padding: 15px; border-radius: 12px; background: #F8FAFC; margin-bottom: 12px; border-left: 4px solid var(--primary-teal); }

        /* --- DASHBOARD GRID --- */
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 4%; display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }

        .balance-card {
            background: linear-gradient(135deg, var(--primary-teal) 0%, #00796B 100%);
            padding: 40px; border-radius: var(--radius-lg); color: white; box-shadow: 0 20px 30px rgba(0, 191, 165, 0.2);
        }
        .balance-amount { font-size: 3rem; font-weight: 800; margin-top: 5px; }

        .converter-card { background: #FFFFFF; padding: 25px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid #EDF2F7; margin-top: 25px; }
        .conv-input { width: 100%; padding: 12px; border: 2px solid #F1F5F9; border-radius: 12px; font-weight: 700; margin-bottom: 10px; }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .action-btn {
            background: white; border: 1px solid #E2E8F0; padding: 25px; border-radius: 20px;
            box-shadow: var(--shadow-sm); cursor: pointer; transition: 0.3s;
            font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .action-btn:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); color: var(--primary-teal); border-color: var(--primary-teal); }

        .profile-card { background: white; padding: 35px; border-radius: var(--radius-lg); text-align: center; box-shadow: var(--shadow-sm); }
        .profile-avatar-container { width: 90px; height: 90px; margin: 0 auto 15px; border-radius: 50%; border: 3px solid #F1F5F9; overflow: hidden; background: #F8FAFC; }
        .profile-avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- AI SIDEBAR STYLES --- */
        .ai-sidebar-wrapper { margin-top: 12px; text-align: left; }
        .ai-window-sidebar {
            display: none; flex-direction: column; background: #F8FAFC; border-radius: 18px; margin-top: 10px;
            border: 1px solid #E2E8F0; height: 380px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .ai-window-sidebar.show { display: flex; animation: slideDown 0.3s ease-out; }
        .ai-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 0.82rem; line-height: 1.4; max-width: 90%; }
        .msg-ai { background: white; border: 1px solid #E2E8F0; align-self: flex-start; color: var(--text-main); }
        .msg-user { background: var(--primary-teal); color: white; align-self: flex-end; }
        .ai-chips { display: flex; gap: 6px; padding: 8px; overflow-x: auto; background: #fff; border-top: 1px solid #EDF2F7; }
        .chip { background: #F1F5F9; color: var(--text-main); padding: 5px 10px; border-radius: 8px; font-size: 0.72rem; cursor: pointer; white-space: nowrap; font-weight: 600; border: 1px solid transparent; }
        .chip:hover { border-color: var(--primary-teal); color: var(--primary-teal); }
        .ai-input-wrapper { display: flex; padding: 10px; background: white; gap: 8px; border-top: 1px solid #EDF2F7; }
        .ai-input-wrapper input { flex: 1; border: 1px solid #E2E8F0; border-radius: 8px; padding: 8px; font-size: 0.85rem; outline: none; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: var(--radius-lg); width: 90%; max-width: 450px; text-align: center; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin: 15px 0; background: #000; }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<div class="notif-drawer" id="notifDrawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;">
        <h2 style="font-weight: 800;">Activity</h2>
        <span style="cursor:pointer; font-size:1.5rem;" onclick="toggleDrawer()">&times;</span>
    </div>
    <hr style="border:0; border-top: 1px solid #F1F5F9; flex-shrink: 0;">

    <div id="notifList"></div>
</div>

<nav class="navbar">
    <a href="#" class="logo">💠 OFS</a>
    <div class="nav-links">
        <span class="nav-link-item" onclick="toggleDrawer()">🔔 Alerts</span>
        <span class="nav-link-item" onclick="goToPassbook()">📖 Passbook</span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="main-container">
    <div class="wallet-column">
        <header><h1 id="welcomeText" style="font-size: 2.2rem; font-weight: 800;">Hi, User</h1></header>

        <div class="balance-card">
            <p style="opacity: 0.9;">Total Balance</p>
            <div class="balance-amount">₹ <span id="balance">0.00</span></div>
        </div>

        <div class="converter-card">
            <p style="font-weight:800; margin-bottom:15px;">🌍 Currency Converter</p>
            <div style="display:flex; gap:10px;">
                <input type="number" id="baseAmount" class="conv-input" oninput="convertCurrency()">
                <select id="targetCurrency" class="btn-logout" onchange="convertCurrency()">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
                <input type="text" id="targetAmount" class="conv-input" readonly>
            </div>
        </div>

        <div class="action-grid">
            <button class="action-btn" onclick="openModal('withdrawModal')"><span>📤</span> Withdraw</button>
            <button class="action-btn" onclick="openModal('depositModal')"><span>📥</span> Deposit</button>
            <button class="action-btn" onclick="openModal('transferModal')"><span>💸</span> Transfer</button>
            <button class="action-btn" onclick="openScanner()"><span>📷</span> Scan to Pay</button>
            <button class="action-btn" onclick="openModal('supportModal')"><span>🎧</span> Need Help?</button>
            <button class="action-btn" onclick="goToPassbook()"><span>📖</span> Passbook</button>
        </div>
    </div>

    <div class="profile-column">
        <div class="profile-card">
            <div class="profile-avatar-container"><img id="dashAvatar" src="" alt="Avatar"></div>
            <h3 id="profileName">User</h3>
            <p style="color:var(--text-muted); font-size:0.8rem;">ID: <span id="userIdDisplay">---</span></p>
            <div style="margin-top: 20px; border-top: 1px solid #F1F5F9; padding-top: 15px;">
                <button class="btn-secondary" onclick="goToSettings()">Settings ⚙️</button>

                <div class="ai-sidebar-wrapper">
                    <button class="btn-primary" onclick="window.location.href='trading.html'"
                            style="background: var(--primary-teal); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        📈 Live Trading Terminal
                    </button>

                    <button class="btn-primary" id="aiToggleBtn" onclick="toggleAiSidebar()" style="background: #1A1D23; font-size: 0.9rem;">
                        🤖 Financial AI Assistant
                    </button>

                    <div class="ai-window-sidebar" id="aiSidebar">
                        <div class="ai-messages" id="aiMsgContainer">
                            <div class="msg msg-ai">Hello! Balance: ₹<span id="aiBalanceVal">0</span>. Ask me anything!</div>
                        </div>
                        <div class="ai-chips">
                            <div class="chip" onclick="quickAsk('Give me a spending summary')">📊 Summary</div>
                            <div class="chip" onclick="quickAsk('How can I save more?')">💡 Saving Tips</div>
                        </div>
                        <div class="ai-input-wrapper">
                            <input type="text" id="aiInputField" placeholder="Ask AI..." onkeypress="if(event.key==='Enter') sendAiReq()">
                            <button class="btn-primary" onclick="sendAiReq()" style="width: 35px; margin:0; padding:0; height: 35px;">➔</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="scannerModal" class="modal">
    <div class="modal-content">
        <h3 style="font-weight: 800;">Scan or Upload QR</h3>
        <div id="reader"></div>
        <div style="margin: 15px 0;">
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 10px;">-- OR --</p>
            <button class="btn-secondary" onclick="document.getElementById('qrFileInput').click()" style="background: var(--text-main); color: white; border: none;">
                🖼️ Upload QR Image
            </button>
            <input type="file" id="qrFileInput" accept="image/*" hidden onchange="handleFileSelect(this)">
        </div>
        <button class="btn-secondary" onclick="closeScanner()">Cancel</button>
    </div>
</div>

<div id="withdrawModal" class="modal"><div class="modal-content"><h3>Withdraw</h3><input type="number" id="withdrawAmount" class="conv-input" style="margin-top:15px;" placeholder="Amount ₹"><button class="btn-primary" onclick="handleFormAction('withdraw')">Confirm</button><button class="btn-secondary" onclick="closeModal('withdrawModal')">Cancel</button></div></div>
<div id="depositModal" class="modal"><div class="modal-content"><h3>Deposit</h3><input type="number" id="depositAmount" class="conv-input" style="margin-top:15px;" placeholder="Amount ₹"><button class="btn-primary" onclick="handleFormAction('deposit')">Confirm</button><button class="btn-secondary" onclick="closeModal('depositModal')">Cancel</button></div></div>
<div id="transferModal" class="modal"><div class="modal-content"><h3>Transfer</h3><input type="text" id="transferUsername" class="conv-input" style="margin-top:15px;" placeholder="Recipient Username"><input type="number" id="transferAmount" class="conv-input" style="margin-top:10px;" placeholder="Amount ₹"><button class="btn-primary" onclick="handleFormAction('transfer')">Send</button><button class="btn-secondary" onclick="closeModal('transferModal')">Cancel</button></div></div>

<div id="supportModal" class="modal">
    <div class="modal-content">
        <h3 style="font-weight: 800; margin-bottom: 15px;">📩 Contact Support</h3>
        <input type="text" id="supportSubject" class="conv-input" placeholder="Subject (e.g. Payment Issue)">
        <textarea id="supportMessage" class="conv-input" style="min-height: 120px; padding-top: 12px; font-family: inherit;" placeholder="Describe your issue in detail..."></textarea>
        <button class="btn-primary" onclick="submitSupportTicket()">Send Message</button>
        <button class="btn-secondary" onclick="closeModal('supportModal')">Cancel</button>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    const API_URL = 'http://localhost:8081';
    const userId = localStorage.getItem("userId");
    let html5QrCode;

    async function loadData() {
        if(!userId) { window.location.href = "login.html"; return; }

        try {
            const res = await fetch(`${API_URL}/get-details/${userId}`);
            if (!res.ok) throw new Error("User data missing");
            const data = await res.json();

            document.getElementById('welcomeText').textContent = `Hi, ${data.username}`;
            document.getElementById('profileName').textContent = data.username;
            document.getElementById('userIdDisplay').textContent = userId;
            document.getElementById('balance').textContent = (data.balance || 0).toLocaleString('en-IN');
            document.getElementById('baseAmount').value = data.balance || 0;

            convertCurrency();
        } catch (e) {
            console.error("Details Sync Error:", e);
            document.getElementById('welcomeText').textContent = "Sync Error";
        }

        try {
            const photoRes = await fetch(`${API_URL}/get-profile-photo/${userId}`);
            const photoData = await photoRes.json();
            const avatarImg = document.getElementById('dashAvatar');
            const username = document.getElementById('profileName').textContent;

            avatarImg.src = (photoData && photoData.photoUrl)
                ? photoData.photoUrl
                : `https://ui-avatars.com/api/?name=${username}&background=00BFA5&color=fff`;
        } catch (e) {
            console.warn("Avatar sync skipped.");
        }

        loadNotifications();
    }

    function toggleAiSidebar() {
        const win = document.getElementById('aiSidebar');
        const btn = document.getElementById('aiToggleBtn');
        const isShowing = win.classList.toggle('show');
        const currentBal = document.getElementById('balance').textContent;
        document.getElementById('aiBalanceVal').textContent = currentBal;
        btn.textContent = isShowing ? '✕ Close Assistant' : '🤖 Financial AI Assistant';
    }

    function quickAsk(text) {
        document.getElementById('aiInputField').value = text;
        sendAiReq();
    }

    async function sendAiReq() {
        const input = document.getElementById('aiInputField');
        const query = input.value.trim();
        if(!query) return;

        appendMsg(query, 'user');
        input.value = '';

        const loadId = 'ai-load-' + Date.now();
        appendMsg('Analyzing data...', 'ai', loadId);

        try {
            const response = await fetch(`${API_URL}/api/ai/consult?userId=${userId}&message=${encodeURIComponent(query)}`);
            const result = await response.text();
            document.getElementById(loadId).innerText = result;
        } catch (err) {
            document.getElementById(loadId).innerText = "Backend Connection Error.";
        }
    }

    function appendMsg(text, type, id) {
        const container = document.getElementById('aiMsgContainer');
        const div = document.createElement('div');
        div.className = `msg msg-${type}`;
        if(id) div.id = id;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function submitSupportTicket() {
        const subject = document.getElementById('supportSubject').value.trim();
        const message = document.getElementById('supportMessage').value.trim();
        if (!subject || !message) { alert("Please fill in both subject and message."); return; }

        const ticketData = { userId: parseInt(userId), subject: subject, message: message };
        try {
            const response = await fetch(`${API_URL}/api/support/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ticketData)
            });
            if (response.ok) {
                alert("Ticket submitted successfully!");
                closeModal('supportModal');
                document.getElementById('supportSubject').value = '';
                document.getElementById('supportMessage').value = '';
                loadNotifications();
            } else { alert("Failed to send message."); }
        } catch (e) { alert("Connection error."); }
    }

    async function openScanner() {
        openModal('scannerModal');
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        try {
            await html5QrCode.start({ facingMode: "environment" }, config,
                async (text) => { processScannedResult(text); }
            );
        } catch (err) {
            alert("Camera access denied.");
            closeModal('scannerModal');
        }
    }

    async function handleFileSelect(input) {
        if (!input.files || input.files.length === 0) return;
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        try {
            const text = await html5QrCode.scanFile(input.files[0], true);
            processScannedResult(text);
        } catch (err) { alert("Invalid QR code image"); }
    }

    async function processScannedResult(text) {
        await closeScanner();
        const recipient = text.includes(':') ? text.split(':').pop().trim() : text.trim();
        openModal('transferModal');
        document.getElementById('transferUsername').value = recipient;
        setTimeout(() => document.getElementById('transferAmount').focus(), 300);
    }

    async function closeScanner() {
        if(html5QrCode) {
            if(html5QrCode.isScanning) await html5QrCode.stop();
            html5QrCode.clear();
        }
        closeModal('scannerModal');
    }

    async function handleFormAction(type) {
        const amountField = document.getElementById(`${type}Amount`);
        const amountVal = parseFloat(amountField?.value || 0);

        if(isNaN(amountVal) || amountVal <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        let bodyData = { id: parseInt(userId), amount: amountVal };
        if (type === 'transfer') {
            bodyData.username = document.getElementById('transferUsername').value;
        }

        try {
            const res = await fetch(`${API_URL}/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(bodyData)
            });
            const resultMsg = await res.text();
            alert(resultMsg);
            closeModal(`${type}Modal`);
            loadData();
        } catch (e) {
            alert("Network error.");
        }
    }

    function convertCurrency() {
        const amount = parseFloat(document.getElementById('baseAmount').value) || 0;
        const targetCurrency = document.getElementById('targetCurrency').value;
        const targetDisplay = document.getElementById('targetAmount');
        const rates = { 'USD': 0.0118, 'EUR': 0.0093 };
        const conversionRate = rates[targetCurrency] || 1;
        const result = amount * conversionRate;
        const symbol = targetCurrency === 'USD' ? '$' : '€';
        targetDisplay.value = `${symbol} ${result.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
    }

    async function loadNotifications() {
        try {
            const res = await fetch(`${API_URL}/notifications?role=customer&userId=${userId}`);
            if (!res.ok) return;
            const notifications = await res.json();
            const list = document.getElementById('notifList');

            if(notifications.length > 0) {
                list.innerHTML = notifications.reverse().map(n => `
                    <div class="notif-item">
                        <p style="font-weight:700;">${n.title}</p>
                        <span style="font-size:0.85rem;">${n.description}</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p style="padding:20px; text-align:center; color:#64748B;">No notifications.</p>';
            }
        } catch (e) {
            console.warn("Notifications sync failed.");
        }
    }

    function toggleDrawer() {
        document.getElementById('notifDrawer').classList.toggle('open');
        document.getElementById('drawerOverlay').classList.toggle('show');
    }

    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    function goToSettings() { window.location.href = 'settings.html'; }
    function goToPassbook() { window.location.href = `passbook.html?id=${userId}`; }

    window.onload = loadData;
</script>
</body>
</html>
