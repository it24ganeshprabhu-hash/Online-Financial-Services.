<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFS | Transaction History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary-teal: #00BFA5;
            --bg-app: #F4F7F9;
            --white: #FFFFFF;
            --text-main: #1A1D23;
            --text-muted: #64748B;
            --radius-lg: 24px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --success: #10B981;
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-app); font-family: 'Inter', sans-serif; color: var(--text-main); }

        .navbar {
            background: var(--white); padding: 1rem 6%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #E2E8F0;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary-teal); text-decoration: none; }
        .nav-right { display: flex; gap: 20px; align-items: center; }
        .back-link { text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; background: none; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        /* Filter Section Styling */
        .filter-bar {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .filter-group input {
            padding: 8px 12px; border: 1px solid #E2E8F0; border-radius: 8px;
            font-family: inherit; font-weight: 600; color: var(--text-main);
        }

        .btn-action {
            padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-filter { background: var(--text-main); color: white; }
        .btn-download { background: var(--primary-teal); color: white; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

        .passbook-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #F8FAFC; padding: 18px 25px; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 20px 25px; border-bottom: 1px solid #F1F5F9; font-weight: 600; font-size: 0.9rem; }

        .type-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; display: inline-block; margin-bottom: 4px; }
        .type-deposit { background: #DCFCE7; color: #166534; }
        .type-withdrawal { background: #FEE2E2; color: #991B1B; }
        .type-transfer { background: #DBEAFE; color: #1E40AF; }

        .pagination { padding: 20px; display: flex; justify-content: center; gap: 8px; background: #F8FAFC; }
        .pagination button { padding: 8px 14px; border: 1px solid #E2E8F0; background: white; border-radius: 8px; cursor: pointer; }
        .pagination button.active { background: var(--primary-teal); color: white; }

        @media (max-width: 600px) { .filter-bar { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>

<nav class="navbar">
    <a id="dashLogo" href="#" class="logo">💠 OFS</a>
    <div class="nav-right">
        <a id="dashLink" class="back-link">← Dashboard</a>
        <button onclick="logout()" class="back-link">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="header-box" style="margin-bottom: 25px;">
        <h1 style="font-size: 2rem; font-weight: 800;">Passbook Sorting</h1>
        <p style="color:var(--text-muted)">Filter your history by date and download reports.</p>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Start Date</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label>End Date</label>
            <input type="date" id="endDate">
        </div>
        <button class="btn-action btn-filter" onclick="applyFilter()">Apply Filter</button>
        <button class="btn-action btn-download" onclick="downloadPDF()">Download PDF</button>
        <button class="btn-action" style="background:#E2E8F0" onclick="resetFilter()">Reset</button>
    </div>

    <div class="passbook-card">
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Details</th>
                <th>Closing Balance</th>
                <th>Amount</th>
            </tr>
            </thead>
            <tbody id="transactionBody"></tbody>
        </table>
        <div id="noData" style="padding:40px; text-align:center; display:none;">No transactions found for this period.</div>
        <div id="paginationControls" class="pagination"></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8081';
    let userId;
    let allTransactions = []; // Raw data from DB
    let filteredTransactions = []; // Data after date sorting
    let currentPage = 1;
    const itemsPerPage = 8;

    function init() {
        const params = new URLSearchParams(window.location.search);
        userId = params.get('id') || localStorage.getItem("userId");
        if (!userId) { window.location.href = "login.html"; return; }

        // Setup Nav
        const dashUrl = `dashboard.html?id=${userId}&role=${params.get('role') || 'customer'}`;
        document.getElementById('dashLink').href = dashUrl;
        document.getElementById('dashLogo').href = dashUrl;

        loadPassbook();
    }

    async function loadPassbook() {
        try {
            const response = await fetch(`${API_URL}/passbook/${userId}`);
            allTransactions = await response.json();

            // Add a temporary date if your DB doesn't have one yet so the filter doesn't crash
            allTransactions = allTransactions.map(t => ({
                ...t,
                date: t.date ? new Date(t.date) : new Date()
            }));

            filteredTransactions = [...allTransactions];
            render();
        } catch (error) { console.error("Error:", error); }
    }

    function applyFilter() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;

        if (!start || !end) {
            alert("Please select both Start and End dates.");
            return;
        }

        const startDate = new Date(start);
        startDate.setHours(0,0,0,0);
        const endDate = new Date(end);
        endDate.setHours(23,59,59,999);

        filteredTransactions = allTransactions.filter(t => {
            const txDate = new Date(t.date);
            return txDate >= startDate && txDate <= endDate;
        });

        currentPage = 1;
        render();
    }

    function resetFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        filteredTransactions = [...allTransactions];
        render();
    }

    function getType(desc) {
        const d = desc.toLowerCase();
        // Custom logic: Trading Withdrawal is a gain for the Bank Account
        if (d.includes('trading') && d.includes('withdrawal')) return 'deposit';

        if (d.includes('deposit')) return 'deposit';
        if (d.includes('withdraw')) return 'withdrawal';
        return 'transfer';
    }

    function render() {
        const tbody = document.getElementById('transactionBody');
        const pag = document.getElementById('paginationControls');
        const noData = document.getElementById('noData');

        // Newest First
        const sorted = [...filteredTransactions].sort((a,b) => new Date(b.date) - new Date(a.date));

        if(sorted.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            pag.innerHTML = '';
            return;
        }

        noData.style.display = 'none';
        const totalPages = Math.ceil(sorted.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const slice = sorted.slice(start, start + itemsPerPage);

        tbody.innerHTML = slice.map(t => {
            const desc = t.description.toLowerCase();
            const type = getType(t.description);

            // Logic: Is this a credit (Green) or debit (Red)?
            // It's green if it's a deposit, or trading withdrawal, or received transfer
            const isCredit = desc.includes('deposit') ||
                             desc.includes('received') ||
                             (desc.includes('trading') && desc.includes('withdrawal')) ||
                             desc.includes('interest');

            return `
            <tr>
                <td style="font-size: 0.8rem; color: var(--text-muted);">
                    ${new Date(t.date).toLocaleDateString('en-IN')}
                </td>
                <td>
                    <span class="type-badge type-${isCredit ? 'deposit' : 'withdrawal'}">${isCredit ? 'CREDIT' : 'DEBIT'}</span>
                    <div style="font-size: 0.85rem;">${t.description}</div>
                </td>
                <td style="color: var(--text-muted);">₹${t.currBalance.toFixed(2)}</td>
                <td style="color: ${isCredit ? 'var(--success)' : 'var(--danger)'}; font-weight: 700;">
                    ${isCredit ? '+' : '-'} ₹${t.amount.toFixed(2)}
                </td>
            </tr>`;
        }).join('');

        pag.innerHTML = '';
        for (let i = 1; i <= totalPages; i++) {
            pag.innerHTML += `<button class="${i === currentPage ? 'active' : ''}" onclick="go(${i})">${i}</button>`;
        }
    }

    function go(page) { currentPage = page; render(); }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("OFS Transaction Statement", 14, 20);
        doc.setFontSize(10);
        doc.text(`Filtered Statement for User ID: ${userId}`, 14, 28);

        const tableData = filteredTransactions.map(t => [
            new Date(t.date).toLocaleDateString('en-IN'),
            t.description,
            `INR ${t.currBalance.toFixed(2)}`,
            `INR ${t.amount.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: 35,
            head: [['Date', 'Description', 'Balance', 'Amount']],
            body: tableData,
            headStyles: { fillColor: [0, 191, 165] }
        });

        doc.save(`Statement_${userId}.pdf`);
    }

    function logout() { localStorage.clear(); window.location.href = 'home.html'; }
    window.onload = init;
</script>
</body>
</html>
